<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💜</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= QR SCREEN ================= -->
<section id="qrScreen" class="screen active">
  <div class="box qr-box">
    <h1>💜 Scan to Open Surprise</h1>

    <!-- QR IMAGE -->
    <img src="qr.png" class="qr" alt="QR Code">

    <p>Scan this QR to continue 💜</p>
  </div>
</section>

<!-- ================= MAIN SITE ================= -->
<div id="site" class="hidden">

<!-- LANDING -->
<section id="landing" class="screen active">
  <h1>Hi my love 💜</h1>
  <button onclick="go('letters')">Open Surprise</button>
</section>

<!-- LETTERS -->
<section id="letters" class="screen">
  <h2>💌 Letters</h2>

  <div class="btns">
    <button onclick="showLetter(0)">Letter 1</button>
    <button onclick="showLetter(1)">Letter 2</button>
    <button onclick="showLetter(2)">Letter 3</button>
  </div>

  <div class="letter active">💜 You are my everything</div>
  <div class="letter">💜 I love you always</div>
  <div class="letter">💜 You are my safe place</div>

  <button onclick="go('gallery')">Next</button>
</section>

<!-- GALLERY -->
<section id="gallery" class="screen">
  <h2>📸 Gallery</h2>

  <div class="grid">
    <div>💜 Memory 1</div>
    <div>💜 Memory 2</div>
    <div>💜 Memory 3</div>
  </div>

  <button onclick="go('flowers')">Next</button>
</section>

<!-- FLOWERS -->
<section id="flowers" class="screen">
  <h2>🌸 Flowers</h2>

  <div onclick="flower('carnation')">🌸 Carnation</div>
  <div onclick="flower('sunflower')">🌻 Sunflower</div>

  <button onclick="go('final')">Next</button>
</section>

<!-- FINAL -->
<section id="final" class="screen">
  <h1>💜 I LOVE YOU 💜</h1>
  <button onclick="location.reload()">Restart</button>
</section>

</div>

<!-- ================= POPUP ================= -->
<div id="popup" class="popup hidden">
  <div class="popup-card">
    <h2 id="title"></h2>
    <p id="msg"></p>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
